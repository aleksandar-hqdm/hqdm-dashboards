<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>HQDM Dashboards · Document Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.7.2/mammoth.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .prose h1 { font-size: 1.875rem; font-weight: 800; margin: 1.5rem 0 1rem; color: #0b1220; }
    .prose h2 { font-size: 1.5rem; font-weight: 700; margin: 1.5rem 0 0.75rem; color: #111827; }
    .prose h3 { font-size: 1.25rem; font-weight: 600; margin: 1.25rem 0 0.5rem; color: #1f2937; }
    .prose h4 { font-size: 1.0625rem; font-weight: 600; margin: 1rem 0 0.5rem; color: #1f2937; }
    .prose p  { margin: 0.5rem 0; line-height: 1.6; color: #374151; }
    .prose ul, .prose ol { margin: 0.5rem 0 0.5rem 1.5rem; line-height: 1.6; color: #374151; }
    .prose ul { list-style-type: disc; }
    .prose ol { list-style-type: decimal; }
    .prose li { margin: 0.25rem 0; }
    .prose code { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.85em; background: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 4px; color: #be185d; }
    .prose pre { background: #1f2937; color: #f9fafb; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 0.85rem; font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .prose pre code { background: transparent; color: inherit; padding: 0; }
    .prose blockquote { border-left: 4px solid #1d5b8a; padding-left: 1rem; color: #6b7280; font-style: italic; margin: 1rem 0; }
    .prose table { border-collapse: collapse; margin: 1rem 0; width: 100%; font-size: 0.875rem; }
    .prose th, .prose td { border: 1px solid #e5e7eb; padding: 0.5rem 0.75rem; text-align: left; vertical-align: top; }
    .prose th { background: #f9fafb; font-weight: 600; }
    .prose tr:nth-child(even) td { background: #fafafa; }
    .prose a { color: #1d5b8a; text-decoration: underline; }
    .prose hr { margin: 2rem 0; border-top: 1px solid #e5e7eb; }
    .prose strong { font-weight: 600; color: #111827; }
    /* CSV / XLSX rendered tables */
    .data-table { border-collapse: collapse; width: 100%; font-size: 0.8125rem; }
    .data-table th { background: #1d5b8a; color: white; padding: 0.5rem 0.75rem; text-align: left; font-weight: 600; position: sticky; top: 0; z-index: 1; cursor: pointer; user-select: none; }
    .data-table th:hover { background: #13315c; }
    .data-table th .sort-ind { opacity: 0.5; margin-left: 4px; font-size: 10px; }
    .data-table td { padding: 0.4rem 0.75rem; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
    .data-table tr:hover td { background: #eef4fa; }
    .data-table tr:nth-child(even) td { background: #fafbfc; }
    .data-table tr:nth-child(even):hover td { background: #eef4fa; }
    .sheet-tabs { display: flex; gap: 0.25rem; padding: 0.5rem 0; border-bottom: 1px solid #e5e7eb; flex-wrap: wrap; }
    .sheet-tab { padding: 0.25rem 0.75rem; font-size: 0.75rem; font-weight: 600; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 4px; cursor: pointer; }
    .sheet-tab.active { background: #1d5b8a; color: white; border-color: #1d5b8a; }
    .filter-bar { display: flex; gap: 0.5rem; padding: 0.5rem 0; align-items: center; }
    .filter-input { padding: 0.375rem 0.75rem; font-size: 0.875rem; border: 1px solid #d1d5db; border-radius: 4px; min-width: 240px; }
    .row-count { font-size: 0.75rem; color: #6b7280; margin-left: auto; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3 min-w-0">
        <a id="back-link" href="../" class="text-xs text-slate-500 hover:text-slate-900">← Back to dashboard</a>
        <span class="text-slate-300">/</span>
        <div class="min-w-0">
          <div class="font-semibold text-sm sm:text-base truncate" id="hdr-file">…</div>
          <div class="text-xs text-slate-500 truncate" id="hdr-client">…</div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <a id="raw-link" href="#" target="_blank" rel="noopener" class="text-xs text-slate-500 hover:text-slate-900 inline-flex items-center gap-1">Raw file ↗</a>
        <span class="inline-block px-2 py-0.5 rounded text-[11px] font-bold uppercase bg-slate-100 text-slate-700" id="hdr-type">…</span>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
    <div id="loader" class="text-center py-16 text-slate-500">Loading…</div>
    <div id="error" class="hidden bg-rose-50 border-l-4 border-rose-500 text-rose-800 p-4 rounded mb-4"></div>

    <!-- CSV / XLSX content -->
    <div id="data-container" class="hidden bg-white rounded-xl shadow-sm border border-slate-200">
      <div id="sheet-tabs-wrap" class="px-4 hidden"></div>
      <div class="px-4 filter-bar">
        <input id="filter-input" class="filter-input" placeholder="Filter rows…" />
        <span class="row-count" id="row-count"></span>
      </div>
      <div class="overflow-x-auto max-h-[75vh] overflow-y-auto">
        <table class="data-table" id="data-table">
          <thead></thead><tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Prose content (MD, DOCX) -->
    <article id="prose-container" class="hidden prose bg-white rounded-xl shadow-sm border border-slate-200 p-6 sm:p-10 max-w-none"></article>

    <!-- PDF / iframe content -->
    <div id="pdf-container" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <iframe id="pdf-frame" class="w-full" style="height: 85vh; border: 0;"></iframe>
    </div>

    <!-- TXT content -->
    <pre id="txt-container" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 p-6 font-mono text-xs whitespace-pre-wrap"></pre>
  </main>

  <footer class="max-w-7xl mx-auto px-4 sm:px-6 py-6 text-xs text-slate-500 border-t border-slate-200">
    <strong class="text-slate-700">HQDM Search Intelligence</strong> · document viewer · noindex, internal use only.
  </footer>

  <script src="./js/viewer.js"></script>
</body>
</html>
